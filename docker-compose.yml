services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-learning-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: dipanjan
      POSTGRES_PASSWORD: localdev_password
      POSTGRES_DB: ai_learning
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: